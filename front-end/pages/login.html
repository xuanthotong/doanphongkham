<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Đăng nhập</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="card-header">
        <h1 class="title">Đăng nhập</h1>
        <a href="register.html" class="switch-link">Đăng ký mới <i class="fas fa-arrow-right"></i></a>
      </div>
      <form class="form-main" action="#" method="post">
        <div class="input-group">
          <label for="username" class="input-label">Số điện thoại / Tên đăng nhập</label>
          <div class="input-field">
            <i class="fas fa-user"></i>
            <input type="text" id="username" name="username" placeholder="Nhập số điện thoại hoặc tên đăng nhập" autocomplete="username" required>
          </div>
        </div>

        <div class="input-group">
          <label for="password" class="input-label">Mật khẩu</label>
          <div class="input-field">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          </div>
        </div>
        <div class="forgot-row">
          <a href="#" class="forgot-link">Quên mật khẩu?</a>
        </div>

        <button type="submit" class="auth-btn">
          Đăng nhập
          <i class="fas fa-sign-in-alt"></i>
        </button>
      </form>

      <div class="divider">
        <span>hoặc</span>
      </div>

      <p class="switch-prompt">
        Bạn chưa có tài khoản? 
        <a href="register.html" class="prompt-link">Đăng ký mới</a>
      </p>
    </div>
  </div>
</body>
</html>
