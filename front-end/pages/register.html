<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Đăng ký</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Thư viện SweetAlert2 cho Pop-up hiện đại -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="card-header">
        <h1 class="title">Đăng ký</h1>
        <a href="login.html" class="switch-link">Đăng nhập <i class="fas fa-arrow-right"></i></a>
      </div>
      <form class="form-main" onsubmit="handleRegister(event)">
        <div class="input-group">
          <label for="reg_fullname" class="input-label">Họ và tên</label>
          <div class="input-field">
            <i class="fas fa-user-circle"></i>
            <input type="text" id="reg_fullname" placeholder="Nhập họ và tên (VD: Nguyễn Văn A)" required>
          </div>
        </div>

        <div class="input-group">
          <label for="reg_username" class="input-label">Tên đăng nhập</label>
          <div class="input-field">
            <i class="fas fa-user"></i>
            <input type="text" id="reg_username" placeholder="Nhập tên đăng nhập (VD: benhnhan123)" required>
          </div>
        </div>

        <div class="input-group">
          <label for="reg_email" class="input-label">Email</label>
          <div class="input-field">
            <i class="fas fa-envelope"></i>
            <input type="email" id="reg_email" placeholder="Nhập địa chỉ email" required>
          </div>
        </div>

        <div class="input-group">
          <label for="reg_phone" class="input-label">Số điện thoại</label>
          <div class="input-field">
            <i class="fas fa-phone"></i>
            <input type="text" id="reg_phone" placeholder="Nhập số điện thoại" required>
          </div>
        </div>

        <div class="input-group">
          <label for="reg_password" class="input-label">Mật khẩu</label>
          <div class="input-field">
            <i class="fas fa-lock"></i>
            <input type="password" id="reg_password" placeholder="Ít nhất 8 ký tự" autocomplete="new-password" required>
            <i class="fas fa-eye toggle-password" onclick="togglePassword(this, 'reg_password')" title="Hiển thị mật khẩu"></i>
          </div>
        </div>

        <button type="submit" class="auth-btn">
          Đăng ký
          <i class="fas fa-user-plus"></i>
        </button>
      </form>

      <div class="divider">
        <span>hoặc</span>
      </div>

      <p class="switch-prompt">
        Đã có tài khoản? 
        <a href="login.html" class="prompt-link">Đăng nhập</a>
      </p>
    </div>
  </div>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
